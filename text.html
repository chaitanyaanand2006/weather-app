<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Report</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cedarville+Cursive&family=Geist+Pixel&family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&family=Oswald:wght@200..700&family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>WEATHER REPORT</h1>

    <div class="search-box">
        <input type="text" 
        id="city-name" 
        placeholder="Enter City Name: ">
    <button id="search-btn">Search</button>
    </div>
    
    <hr>

    <div class="weather-card">
        
    <h3>
        🌡 Temperature:
        <span id="temperature">--</span>
    </h3>
    <h3>
        📍 City:
         <span id="city">--</span>
    </h3>

    <h3>
        ☁ Weather:
        <span id="weather">--</span>
    </h3>

    <h3>
        💧 Humidity:
        <span id="humidity">--</span>
    </h3>

    <h3>
        💨 Wind:
        <span id="wind">--</span>
    </h3>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
